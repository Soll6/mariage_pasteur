name: mariage_pasteur
description: Application de mariage pour Sonia & Aimé Francis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  provider: ^6.1.2
  model_viewer_plus: ^1.9.0
  url_launcher: ^6.2.5
  supabase_flutter: ^2.8.3
  image_picker: ^1.1.2
  flutter_signin_button: ^2.0.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.6.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
