<div class="text-center space-y-4 animate-fade-in">
<h1 class="font-display text-display text-primary italic">Une invitation spéciale vous attend...</h1>
<p class="font-body-lg text-secondary-fixed-dim uppercase tracking-widest text-sm">Sonia &amp; Aimé Francis</p>
</div>
<!-- Envelope Presentation -->
<div class="relative w-full max-w-[500px] aspect-[4/3] flex items-center justify-center">
<!-- Background Layer / Texture -->
<div class="absolute inset-0 bg-tertiary-fixed rounded-xl envelope-shadow border border-outline-variant/30 overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/linen-paper.png')]"></div>
<!-- Artistic Flourish Background -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary-fixed-dim/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-secondary-fixed/30 rounded-full blur-3xl"></div>
</div>
<!-- Envelope Flap & Card Mockup -->
<div class="relative z-10 w-[85%] aspect-[1.6/1] bg-surface-container-lowest rounded-sm shadow-sm flex flex-col items-center justify-center p-8 border border-outline-variant/10">
<div class="absolute top-0 left-0 w-full h-2 bg-primary"></div>
<!-- Wax Seal Element -->
<div class="mb-6 flex items-center justify-center">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center shadow-lg transform rotate-12">
<span class="material-symbols-outlined text-surface text-3xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<div class="text-center space-y-2">
<p class="font-headline-md text-primary font-serif italic">Le Grand Jour</p>
<div class="h-px w-12 bg-outline-variant mx-auto"></div>
<p class="font-label-sm text-secondary uppercase tracking-tighter">Précieux Moments</p>
</div>
</div>

</div>
</div>

<button class="px-12 py-4 bg-primary text-on-primary rounded-full font-body-md text-lg tracking-wide shadow-lg hover:bg-on-primary-fixed-variant transition-all duration-300 transform active:scale-95 group flex items-center gap-3">
                Ouvrir l'enveloppe
                <span class="material-symbols-outlined text-surface group-hover:translate-x-1 transition-transform" data-icon="mail_lock">mail_lock</span>
</button>
<button class="px-8 py-2 border-b border-secondary text-secondary font-label-sm uppercase tracking-widest hover:text-primary hover:border-primary transition-colors">
                En savoir plus
            </button>
</div>
</main>

<footer class="w-full flex flex-col items-center gap-4 text-center px-8 py-12 mt-auto border-t border-stone-200">
<p class="text-xs font-serif italic text-orange-800">© 2026 Sonia &amp; Aimé Francis. Fait avec amour.</p>
<div class="flex gap-6">
<a class="text-xs font-serif italic text-stone-400 hover:text-orange-600 transition-colors duration-300" href="#">Mentions Légales</a>
